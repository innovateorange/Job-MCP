# LoRA Fine-Tune Config — Resume Writer / Improver
# Base: Llama 3.2 3B Instruct
# ==================================================
#
# Datasets:
#   - MikePfunk28/resume-training-dataset (22,855 conversations)
#
# This is the largest dataset of the three — training will take longer
# but the model gets the most practice.
#
# Download data first:
#   python finetune/scripts/download_datasets.py --task resume_writer

base_model: "meta-llama/Llama-3.2-3B-Instruct"
task: resume_writer

train_data: "finetune/data/resume_writer_train.jsonl"
val_data: "finetune/data/resume_writer_val.jsonl"

lora_r: 64
lora_alpha: 128
lora_dropout: 0.05
target_modules:
  - q_proj
  - k_proj
  - v_proj
  - o_proj
  - gate_proj
  - up_proj
  - down_proj

# 22K examples — fewer epochs needed, data is rich
num_epochs: 2
per_device_train_batch_size: 4
per_device_eval_batch_size: 4
gradient_accumulation_steps: 4
learning_rate: 1.0e-4       # slightly lower LR for large dataset
weight_decay: 0.01
warmup_ratio: 0.03
lr_scheduler: cosine
max_seq_length: 4096
packing: false
quantize_4bit: true
bf16: true

logging_steps: 25
save_steps: 500
eval_steps: 500
seed: 42
report_to: none

output_dir: "outputs/resume-writer-lora"
