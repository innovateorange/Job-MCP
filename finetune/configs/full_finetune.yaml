# Full Fine-Tune Config — All Tasks Combined
# Base: Llama 3.2 3B Instruct
# =============================================
# Trains a single model on all three tasks using the combined dataset.
# Llama 3.2 3B is small enough for full fine-tune on a single 48GB GPU
# (A6000 / A40 / A100-40GB) or 2x 24GB GPUs with DeepSpeed ZeRO-2.
#
# Download data first:
#   python finetune/scripts/download_datasets.py --task all

base_model: "meta-llama/Llama-3.2-3B-Instruct"
task: all

train_data: "finetune/data/combined_train.jsonl"
val_data: null              # use per-task val sets for evaluation

num_epochs: 3
per_device_train_batch_size: 4
per_device_eval_batch_size: 4
gradient_accumulation_steps: 4
learning_rate: 5.0e-5
weight_decay: 0.01
warmup_ratio: 0.05
lr_scheduler: cosine
max_seq_length: 4096
packing: false
bf16: true

logging_steps: 25
save_steps: 500
seed: 42
report_to: none

output_dir: "outputs/full-finetune-3b-all"

# DeepSpeed ZeRO-2 (uncomment for multi-GPU)
# deepspeed_config: "finetune/configs/ds_zero2.json"
