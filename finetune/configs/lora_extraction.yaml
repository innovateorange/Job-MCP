# LoRA Fine-Tune Config — Resume Extraction
# Base: Llama 3.2 3B Instruct
# ===========================================
# Trains the model to parse raw resume text into structured JSON profiles.
#
# Datasets:
#   - datasetmaster/resumes (structured resume profiles)
#   - InferencePrince555/Resume-Dataset (resume text + categories)
#
# Download data first:
#   python finetune/scripts/download_datasets.py --task extraction

base_model: "meta-llama/Llama-3.2-3B-Instruct"
task: extraction

# Data
train_data: "finetune/data/extraction_train.jsonl"
val_data: "finetune/data/extraction_val.jsonl"

# LoRA hyperparameters (tuned for 3B model)
lora_r: 64               # higher rank for 3B — more capacity since model is smaller
lora_alpha: 128           # 2x rank
lora_dropout: 0.05
target_modules:
  - q_proj
  - k_proj
  - v_proj
  - o_proj
  - gate_proj
  - up_proj
  - down_proj

# Training (3B fits easily on a single 24GB GPU with QLoRA)
num_epochs: 4
per_device_train_batch_size: 8
per_device_eval_batch_size: 8
gradient_accumulation_steps: 2
learning_rate: 2.0e-4
weight_decay: 0.01
warmup_ratio: 0.05
lr_scheduler: cosine
max_seq_length: 4096
packing: true
quantize_4bit: true       # QLoRA — fits in ~6GB VRAM
bf16: true

# Logging & saving
logging_steps: 10
save_steps: 200
eval_steps: 200
seed: 42
report_to: none           # "wandb" or "tensorboard"

# Output
output_dir: "outputs/extraction-lora"
